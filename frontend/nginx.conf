server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — unknown paths → index.html (React Router handles routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy to NestJS API — avoids CORS in the composed stack.
    # Loopback, not a container-name hostname: in ECS awsvpc mode the web and
    # api containers share one task-level network namespace/ENI, so sibling
    # containers reach each other via localhost, not Docker-Compose-style DNS
    # (see infra/DEPLOYMENT_PLAN.md: "nginx :80 in the task → API :3000 over
    # the task's loopback").
    location /api/ {
        proxy_pass         http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;

        # SSE: disable buffering so streamed tokens reach the browser immediately
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # SSE requires these to pass through cleanly
        proxy_set_header   Connection        '';
        chunked_transfer_encoding on;
    }

    # Deny dot-files (.env, .git, etc.)
    location ~ /\. {
        deny all;
    }
}
