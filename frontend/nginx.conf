# NOTE: this file is processed as an nginx *template* at container start.
# The official nginx image runs envsubst over /etc/nginx/templates/*.template
# and writes the result to /etc/nginx/conf.d/. Only ${API_UPSTREAM} is
# substituted (NGINX_ENVSUBST_FILTER in the Dockerfile pins that), so nginx's
# own runtime variables ($uri, $host, ...) pass through untouched.
#
# ${API_UPSTREAM} is where the API lives relative to this nginx:
#   - ECS (default, set in Dockerfile): 127.0.0.1:3000 — web + api share one
#     awsvpc task network namespace, so the sibling is reachable on loopback.
#   - docker-compose production: api:3000 — separate containers on a bridge
#     network, reached by Docker service DNS (set in docker-compose.yml).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — unknown paths → index.html (React Router handles routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy to the NestJS API.
    #
    # proxy_pass ends in "/" (not "/api/") so nginx STRIPS the /api/ location
    # prefix before forwarding: /api/auth/login → /auth/login. The backend
    # mounts routes at the root (no setGlobalPrefix), so /api exists only as the
    # browser-side marker telling nginx "this is an API call, proxy it" vs. an
    # SPA route to serve index.html. Forwarding /api/* verbatim is what produced
    # 404 "Cannot POST /api/auth/login".
    location /api/ {
        proxy_pass         http://${API_UPSTREAM}/;
        proxy_http_version 1.1;

        # SSE: disable buffering so streamed tokens reach the browser immediately
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # SSE requires these to pass through cleanly
        proxy_set_header   Connection        '';
        chunked_transfer_encoding on;
    }

    # Deny dot-files (.env, .git, etc.)
    location ~ /\. {
        deny all;
    }
}
