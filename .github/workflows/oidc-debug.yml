name: OIDC Debug (temporary)

# Prints the decoded OIDC token GitHub actually sends - no AWS call, no
# third-party action, just curl + jq against GitHub's own token endpoint.
# Delete this file once the sts:AssumeRoleWithWebIdentity issue is resolved.

on:
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  debug-default:
    name: Debug (no environment)
    runs-on: ubuntu-latest
    steps:
      - name: Request and decode OIDC token
        run: |
          IDTOKEN=$(curl -sSL -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
          echo "$IDTOKEN" | cut -d '.' -f2 | base64 -d 2>/dev/null | jq .

  debug-production-env:
    name: "Debug (environment: production)"
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Request and decode OIDC token
        run: |
          IDTOKEN=$(curl -sSL -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
          echo "$IDTOKEN" | cut -d '.' -f2 | base64 -d 2>/dev/null | jq .
